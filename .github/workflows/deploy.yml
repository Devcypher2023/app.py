name: Deploy to EC2

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  validate-deploy-inputs:
    runs-on: ubuntu-latest

    steps:
      - name: Check required secrets exist
        run: |
          test -n "${{ secrets.EC2_HOST }}"
          test -n "${{ secrets.EC2_USER }}"
          test -n "${{ secrets.EC2_SSH_KEY }}"
          test -n "${{ secrets.DOCKERHUB_USERNAME }}"

  test-ssh-connection:
    runs-on: ubuntu-latest
    needs: validate-deploy-inputs

    steps:
      - name: Create SSH key file
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Test SSH connection
        run: |
          ssh -i private_key.pem -o StrictHostKeyChecking=no \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo SSH connection successful"

  copy-deploy-script:
    runs-on: ubuntu-latest
    needs: test-ssh-connection

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Create SSH key file
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Copy deploy script to EC2
        run: |
          scp -i private_key.pem -o StrictHostKeyChecking=no \
          scripts/deploy.sh \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/deploy.sh

      - name: Verify script exists on EC2
        run: |
          ssh -i private_key.pem -o StrictHostKeyChecking=no \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "ls -l /home/ec2-user/deploy.sh"

  test-run-deploy-script:
    runs-on: ubuntu-latest
    needs: copy-deploy-script

    steps:
      - name: Create SSH key file
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Make script executable and test it
        run: |
          ssh -i private_key.pem -o StrictHostKeyChecking=no \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            chmod +x /home/ec2-user/deploy.sh &&
            /home/ec2-user/deploy.sh
          "

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs:
      - copy-deploy-script
      - prepare-release

    steps:
      - name: Create SSH key file
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Run deployment on EC2
        run: |
          ssh -i private_key.pem -o StrictHostKeyChecking=no \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            chmod +x /home/ec2-user/deploy.sh &&
            /home/ec2-user/deploy.sh ${{ secrets.DOCKERHUB_USERNAME }}/standardized-cicd-app:${{ needs.prepare-release.outputs.image_tag }}
          "              