name: Deploy to EC2

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy manually (for rollback)"
        required: true

jobs:
  validate-deploy-inputs:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check required secrets exist
        run: |
          test -n "${{ secrets.EC2_HOST }}"
          test -n "${{ secrets.EC2_USER }}"
          test -n "${{ secrets.EC2_SSH_KEY }}"
          test -n "${{ secrets.DOCKERHUB_USERNAME }}"

  prepare-release:
    runs-on: ubuntu-latest
    needs: validate-deploy-inputs
    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}

    steps:
      - name: Determine image tag
        id: set_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
            echo "image_tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          fi

  test-ssh-connection:
    runs-on: ubuntu-latest
    needs: prepare-release

    steps:
      - name: Create SSH key file
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Test SSH connection
        run: |
          ssh -i private_key.pem -o StrictHostKeyChecking=no \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo SSH connection successful"

  copy-deploy-script:
    runs-on: ubuntu-latest
    needs: test-ssh-connection

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Create SSH key file
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Copy deploy script to EC2
        run: |
          scp -i private_key.pem -o StrictHostKeyChecking=no \
          scripts/deploy.sh \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/deploy.sh

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs:
      - copy-deploy-script
      - prepare-release

    steps:
      - name: Create SSH key file
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Run deployment on EC2
        run: |
          ssh -i private_key.pem -o StrictHostKeyChecking=no \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            chmod +x /home/ec2-user/deploy.sh &&
            /home/ec2-user/deploy.sh ${{ secrets.DOCKERHUB_USERNAME }}/standardized-cicd-app:${{ needs.prepare-release.outputs.image_tag }}
          "

  verify-deployment:
    runs-on: ubuntu-latest
    needs:
      - deploy-to-ec2
      - prepare-release

    steps:
      - name: Verify app health from outside EC2
        run: |
          curl -f http://${{ secrets.EC2_HOST }}:5000/health

      - name: Verify deployed version matches expected image tag
        run: |
          RESPONSE=$(curl -s http://${{ secrets.EC2_HOST }}:5000/health)
          echo "$RESPONSE"
          echo "$RESPONSE" | grep "${{ needs.prepare-release.outputs.image_tag }}"