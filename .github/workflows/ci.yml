name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  validate-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Show repo structure
        run: |
          pwd
          ls -la
          echo "----- app folder -----"
          ls -la app || true
          echo "----- terraform folder -----"
          ls -la terraform || true

      - name: Validate required app files
        run: |
          test -f app/app.py
          test -f app/requirements.txt
          test -f app/Dockerfile

      - name: Validate required terraform files
        run: |
          test -f terraform/main.tf
          test -f terraform/variables.tf
          test -f terraform/provider.tf
          test -f terraform/versions.tf
          test -f terraform/outputs.tf

  validate-terraform:
    runs-on: ubuntu-latest
    needs: validate-files

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        run: terraform -chdir=terraform fmt -check

      - name: Terraform init
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform validate
        run: terraform -chdir=terraform validate

  build-image:
    runs-on: ubuntu-latest
    needs:
      - validate-files
      - validate-terraform

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t standardized-cicd-app:test ./app              