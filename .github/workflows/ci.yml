name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  validate-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Show repo structure
        run: |
          pwd
          ls -la
          echo "----- app folder -----"
          ls -la app || true
          echo "----- terraform folder -----"
          ls -la terraform || true
          echo "----- workflows folder -----"
          ls -la .github/workflows || true

      - name: Validate required app files
        run: |
          test -f app/app.py
          test -f app/requirements.txt
          test -f app/Dockerfile